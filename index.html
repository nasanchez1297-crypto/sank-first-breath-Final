<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sank - One Breath</title>

<style>
:root{
  --dark:#111;
  --white:#fff;
}

/* GENERAL */
body{
  margin:0;
  font-family: 'Georgia', serif;
  background:#fafafa;
  color:#111;
  text-align:center;
  padding:40px 20px;
}

/* BUTTONS */
button{
  margin:10px;
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#111;
  color:#fff;
  cursor:pointer;
}

/* TEXTAREA */
textarea{
  width:90%;
  max-width:500px;
  height:120px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  resize:none;
}

/* RESULT */
#result{
  margin-top:20px;
  font-size:18px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:32px;
  left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--dark);
  color:var(--white);
  padding:14px 18px;
  border-radius:10px;
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  transition:transform .3s ease, opacity .3s ease;
  z-index:200;
  width:min(92vw, 420px);
  text-align:center;
  line-height:1.5;
  white-space:normal;
  opacity:0;
}
.toast.show{
  transform:translateX(-50%) translateY(0);
  opacity:1;
}
</style>
</head>

<body>

<h2>Speak with God</h2>

<textarea id="userInput" placeholder="Write your message..."></textarea>
<br>
<button onclick="askGod()">Ask</button>
<button onclick="openDailyVerse()">Today's Verse</button>

<div id="result"></div>

<div id="toast" class="toast"></div>

<script>

/* =========================
   TOAST (MENSAJES)
========================= */
let toastTimer = null;

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');

  if (toastTimer) clearTimeout(toastTimer);

  toastTimer = setTimeout(()=>{
    t.classList.remove('show');
  }, 4000);
}

/* =========================
   ASK GOD (GEMINI FIXED)
========================= */
async function askGod(){

  let input = document.getElementById("userInput").value.trim();

  if(!input){
    showToast("Write something first");
    return;
  }

  // LIMIT CONTROL (NO MÁS ERRORES)
  if(input.length > 500){
    showToast("Message too long. Try shorter.");
    return;
  }

  document.getElementById("result").innerText = "Listening...";

  try{
    const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=YOUR_API_KEY",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        contents:[{
          parts:[{
            text: input
          }]
        }]
      })
    });

    const data = await res.json();

    if(data.candidates && data.candidates[0].content.parts[0].text){
      document.getElementById("result").innerText =
        data.candidates[0].content.parts[0].text;
    }else{
      throw new Error("Invalid response");
    }

  }catch(e){
    console.error(e);
    document.getElementById("result").innerText = "";
    showToast("Something went wrong. Try again.");
  }
}

/* =========================
   VERSES (NO REPETIDOS)
========================= */

const VERSE_POOL = [
"John 3:16",
"Psalm 23:1",
"Romans 8:28",
"Philippians 4:13",
"Jeremiah 29:11",
"Isaiah 41:10",
"Matthew 11:28",
"Proverbs 3:5",
"Luke 1:37",
"2 Corinthians 5:7",
"Psalm 118:24",
"Joshua 1:9"
];

function getTodayKey(){
  return new Date().toISOString().split("T")[0];
}

function getHistory(){
  try{
    return JSON.parse(localStorage.getItem("verse_history")||"[]");
  }catch{
    return [];
  }
}

function saveHistory(h){
  localStorage.setItem("verse_history", JSON.stringify(h));
}

function pickVerse(){
  let history = getHistory();
  let recent = history.slice(-5).map(v=>v.ref); // evita últimos 5

  let available = VERSE_POOL.filter(v=>!recent.includes(v));
  if(!available.length) available = VERSE_POOL;

  return available[Math.floor(Math.random()*available.length)];
}

function rememberVerse(ref){
  let history = getHistory();
  let today = getTodayKey();

  if(history.some(v=>v.date===today)) return;

  history.push({date:today, ref});
  if(history.length>20) history = history.slice(-20);

  saveHistory(history);
}

async function openDailyVerse(){

  const verseRef = pickVerse();

  try{
    const res = await fetch(`https://bible-api.com/${verseRef}`);
    const data = await res.json();

    if(data.text){
      document.getElementById("result").innerText =
        data.text + " — " + data.reference;

      rememberVerse(verseRef);

      showToast("Mary treasured up all these things and pondered them in her heart. — Luke 2:19");
    }

  }catch(e){
    showToast("Could not load verse");
  }
}

</script>

</body>
</html>
